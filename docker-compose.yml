# Week 8 — nginx → gunicorn → Flask → Postgres (Study Guide §6)

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./static:/app/static:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/app
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
