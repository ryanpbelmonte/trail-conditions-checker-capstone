# $http_host preserves the port (e.g. localhost:62489) so Flask url_for(..., _external=True)
# matches the browser URL for GitHub OAuth callbacks behind Cursor port forwarding.
proxy_set_header Host              $http_host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_redirect off;
