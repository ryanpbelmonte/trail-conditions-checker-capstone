worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    upstream app {
        server app:8000;
    }

    # §10 — block scanner paths before proxy_pass (Nick / nstjern-hardening)
    map $uri $is_attack_path {
        default 0;
        ~^/wp-login\.php$                       1;
        ~^/wp-admin/                            1;
        ~^/\.env$                               1;
        ~^/\.git/config$                        1;
        ~^/\.git/HEAD$                          1;
        ~^/\.aws/credentials$                   1;
        ~^/\.ssh/id_rsa$                        1;
        ~^/admin/$                              1;
        ~^/administrator/$                      1;
        ~^/phpmyadmin/$                         1;
        ~^/xmlrpc\.php$                         1;
        ~^/server-status$                       1;
        ~^/backup\.sql$                         1;
        ~^/\.htaccess$                          1;
        ~^/config\.php$                         1;
        ~^/wp-content/plugins/                  1;
        ~^/vendor/phpunit/                      1;
        ~^/\.well-known/openid-configuration$  1;
        ~^/_profiler/                           1;
        ~^/actuator/health$                     1;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # §9 — Liam (liam-hardening): review/tighten after Bootstrap + inline JS audit
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' https://cdn.jsdelivr.net; script-src 'self'; img-src 'self' data:" always;

        if ($is_attack_path) {
            return 404;
        }

        location /static/ {
            alias /app/static/;
            expires 30d;
        }

        location = /login {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://app;
            include /etc/nginx/proxy_params.conf;
        }

        location = /register {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://app;
            include /etc/nginx/proxy_params.conf;
        }

        location / {
            proxy_pass http://app;
            include /etc/nginx/proxy_params.conf;
        }
    }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}
