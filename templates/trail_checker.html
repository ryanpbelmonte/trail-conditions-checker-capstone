{% extends "base.html" %}

{% block content %}
<section class="py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card border-0 shadow-sm tc-hero-card tc-surface-card">
                <div class="card-body p-4 p-md-5 text-center">
                    <img
                        src="{{ url_for('static', filename='images/trail-hero.svg') }}"
                        alt=""
                        class="tc-hero-illustration tc-hero-illustration-sm mb-4"
                        width="240"
                        height="180"
                    >

                    <p class="tc-brand-text tc-hero-tagline mb-4">Find your trail</p>

                    <h1 class="visually-hidden">Trail Checker</h1>

                    <form method="GET" action="/trail-checker/results">
                        <div class="input-group input-group-lg">
                            <input
                                id="trail-search"
                                type="text"
                                name="q"
                                class="form-control"
                                placeholder="Search by city, park, or trail"
                                aria-label="Search by city, park, or trail"
                                value="{{ query_text or '' }}"
                                minlength="2"
                                maxlength="100"
                                required
                            >
                            <button type="submit" class="btn btn-primary">
                                Check
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-muted small text-center mt-3 mb-0">
                Planning helper only — not an official safety source.
            </p>
        </div>
    </div>
</section>
{% endblock %}
